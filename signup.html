<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadharon Store | Premium Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
   <link rel="stylesheet"href="css/index.css">
    <style>
    
      /*. CLEAN LOGIN PAGE STYLES */
.login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f1f5f9;
  padding: 15px;
    margin-bottom: 100px;
}

.login-container {
  background: white;
  width: 100%;
  max-width: 550px;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
}

.login-header {
  text-align: center;
  margin-bottom: 30px;
}

.back-home {
  display: inline-block;
  margin-bottom: 15px;
  font-size: 13px;
  color: #64748b;
  text-decoration: none;
  font-weight: 600;
}

.back-home:hover { color: #FF6B35; }

.login-logo {
  color: #FF6B35;
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 5px;
}

.login-header p {
  color: #64748b;
  font-size: 14px;
}

.input-group {
  margin-bottom: 20px;
}

.input-group label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #1e293b;
}

.label-row {
  display: flex;
  justify-content: space-between;
}

.forgot-link {
  font-size: 12px;
  color: #FF6B35;
  text-decoration: none;
}

.input-wrapper input, textarea {
  width: 100%;
  padding: 12px 16px; /* Balanced padding without icons */
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-size: 15px;
  background: #fff;
}


.input-wrapper input:focus {
  outline: none;
  border-color: #FF6B35;
}
.input-wrapper textarea:focus {
  outline: none;
  border-color: #FF6B35;
}
.remember-me {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 25px;
}

.btn-login-submit {
  width: 100%;
  background: #FF6B35;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
}

.btn-login-submit:hover {
  background: #e55a2b;
}

#message {
  margin-top: 15px;
}
.login-footer {
  text-align: center;
  margin-top: 25px;
  font-size: 14px;
  color: #64748b;
}

.login-footer a {
  color: #FF6B35;
  text-decoration: none;
  font-weight: 600;
}
 .showCon {
   display: flex;
   justify-content: end;
 }
 #showPass {
   text-align: right;
   color: gray;
   padding: 3px 8px;
   display: inline-block;
 }
    </style>
</head>
<body>   
    <header>
        <div class="container nav-flex"><div onclick="window.location.href='index.html'"  class="logo">Sadharon<span>Store</span></div><div onclick="window.location.href='add-to-cart.html'" id="cart-count-display" style="background: #1e293b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;"><i data-lucide="shopping-cart" style="width: 14px; vertical-align: middle;"></i> <span id="count">0</span></div></div>
    </header>
    <!-- bottom nav section -->
    <section class="bottom-nav">
      <a href="index.html" class="bottom-link"><i data-lucide="home"></i><span>হোম</span></a>
      <a href="index.html" class="bottom-link"><i data-lucide="grid"></i><span>ক্যাটাগরি</span></a>
      <div class="bottom-link main-cart">
        <div onclick="window.location.href='add-to-cart.html'" class="cart-btn-inner">
          <i data-lucide="shopping-bag"></i>
          <span id="myCart" class="cart-badge">0</span>
        </div>
      </div>      
      <a href="view-order.html" class="bottom-link">  <i data-lucide="package"></i> <span>আমার অর্ডার</span></a>
      <a href="profile.html" class="bottom-link active"><i data-lucide="user"></i><span>প্রোফাইল</span></a>
    </section>    

  <main class="container">
   <div class="login-page">
  <div class="login-container">
    <div class="login-header">
      <a href="index.html" class="back-home">Back to Home</a>
      <h1 class="login-logo">Sadharon Store</h1>
      <p>Welcome back! Please enter your details.</p>
        <div id="message"></div>
    </div>

    <form id="signupForm" class="login-form">
      <div class="input-group">
        <label for="name">Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="name" placeholder="Your name" required>
        </div>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label for="phone">Phone Number</label>
      </div>
        <div class="input-wrapper">
          <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
        </div>
      </div>
      
        <div class="input-group">
        <div class="label-row">
          <label for="address">Address</label>
        </div>
        <div class="input-wrapper">
             <textarea id="address" placeholder="Flat, House, Road, Area..." required></textarea>
        </div>
      </div>
      
    <div class="input-group">
        <div class="label-row">
          <label for="password">Password</label>
         </div>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="min. 6 characters" required>
        </div>
      </div>
      <div class="showCon">
            <p id="showPass">Show</p>      
      </div>
 
      <div class="remember-me">
        <input type="checkbox" id="terms-condition" checked>
          <label>Terms and Condition</label> 
      </div>

      <button type="submit" id="submitBtn" class="btn-login-submit">Register</button>
    </form>

    <div class="login-footer">
      <p>I have an account? <a href="login.html">Please login</a></p>
    </div>
  </div>
</div>
  </main>
   

    <script>
    const LOCALHOST = "http://localhost:3000/users";
  const SERVER = "https://sadharon-store-server.vercel.app/products";
    const API = window.location.hostname.includes("vercel") ? SERVER : LOCALHOST;

      // ডাইনামিক আইকন থাকলে তা সক্রিয় করা
      if(window.lucide) lucide.createIcons();
      // ১. কার্ট সংখ্যা আপডেট (ব্যাক বাটন সাপোর্ট সহ)
  function calMyCart() {
    const myCartEle = document.getElementById("myCart");
      const topCart = document.getElementById("count")
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = cart.reduce((acc, item) => acc + (item.quantity || 0), 0);
    
    myCartEle.innerHTML = total;
    topCart.innerHTML= total;
      }

  window.addEventListener('pageshow', function(event) {
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
      calMyCart();
    }
  });
    
calMyCart()
    
    
  document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    const userData = {
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value,
      password: document.getElementById('password').value,
    };

    submitBtn.innerText = "Processing...";
    submitBtn.disabled = true;

    try {
      const response = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(userData)
      });

      const data = await response.json();

      messageDiv.style.display = "block";
      if (data.success) {
        messageDiv.style.background = "#e55a2b30";
        messageDiv.style.color = "#155724";
        messageDiv.innerText = data.message;
        setTimeout(() => { window.location.href = "login.html"; }, 1500);
      } else {
        messageDiv.style.background = "#f8d7da";
        messageDiv.style.color = "#721c24";
        messageDiv.innerText = data.message;
        submitBtn.disabled = false;
        submitBtn.innerText = "Sign Up";
      }
    } catch (err) {
      messageDiv.style.display = "block";
      messageDiv.style.background = "#f8d7da";
      messageDiv.style.color = "#721c24";
      messageDiv.innerText = "Connection error. Please try again.";
      submitBtn.disabled = false;
      submitBtn.innerText = "Sign Up";
    }
  });

let isHide = false;
const passwordInput = document.getElementById("password");
const toggleBtn = document.getElementById("showPass");

toggleBtn.addEventListener("click", () => {
  // 1. Toggle the boolean state
  isHide = !isHide; 
  // 2. Update the button text
  toggleBtn.innerHTML = isHide ? "Hide" : "Show";
  
  // 3. Change the input type (This is the "magic" part)
  passwordInput.type = isHide ? "text" : "password";
});

    
    </script>
</body>
</html>
