<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Sadharon Store | Premium Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
   <link rel="stylesheet"href="css/index.css">
    <style>
      main {
    padding: 35px 0 100px;
  }

.loading{
  text-align:center;
  color:#777;
  margin-top:40px;
}
  

.order-header-main {
    margin-bottom: 30px;
    text-align: center;
}

.order-header-main h2 {
    font-size: 28px;
    color: #2d3436;
    margin-bottom: 5px;
}

/* অর্ডার কার্ড */
.order-card {
    background: #fff;
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 25px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    border: 1px solid #edf2f7;
}

.order-header {
    display: flex;
    justify-content: space-between;
    padding-bottom: 15px;
    border-bottom: 1px solid #f1f1f1;
}

.customer-name {
    font-weight: 700;
    font-size: 16px;
    color: #2d3436;
}

.order-id {
    font-size: 12px;
    color: #636e72;
}

.status-tag {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
}

/* আইটেম লিস্ট */
.order-items-container {
    margin: 15px 0;
}

.item-row {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 10px 0;
    border-bottom: 1px dashed #f1f1f1;
}

.item-row:last-child { border-bottom: none; }

.item-row img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 8px;
}

.item-info h4 {
    margin: 0;
    font-size: 14px;
    color: #2d3436;
}

.item-info p {
    margin: 2px 0 0 0;
    font-size: 12px;
    color: #636e72;
}

.order-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 15px;
    border-top: 1px solid #f1f1f1;
}

.total-amount {
    font-size: 18px;
    font-weight: 800;
    color: #00b894;
}

.loading-spinner {
    text-align: center;
    padding: 50px;
    color: #636e72;
}

    
    </style>
</head>
<body>   
      <header>
        <div class="container nav-flex"><div onclick="window.location.href='/'"  class="logo">Sadharon<span>Store</span></div><a class="help" href="help.html">? সহায়তা</a><div onclick="window.location.href='add-to-cart.html'" id="cart-count-display" style="background: #1e293b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;"><i data-lucide="shopping-cart" style="width: 14px; vertical-align: middle;"></i> <span id="count">0</span></div></div>
    </header>
    <!-- bottom nav section -->
    <section class="bottom-nav">
      <a href="/" class="bottom-link"><i data-lucide="home"></i><span>হোম</span></a>
      <a href="/category.html" class="bottom-link"><i data-lucide="grid"></i><span>ক্যাটাগরি</span></a>
      <div class="bottom-link main-cart">
        <div onclick="window.location.href='/add-to-cart.html'" class="cart-btn-inner">
          <i data-lucide="shopping-bag"></i>
          <span id="myCart" class="cart-badge">0</span>
        </div>
           <span>আমার কার্ট</span>
      </div>      
      <a href="view-order.html" class="bottom-link active">  <i data-lucide="package"></i> <span>আমার অর্ডার</span></a>
      <a href="profile.html" class="bottom-link"><i data-lucide="user"></i><span>প্রোফাইল</span></a>
    </section>    


<main class="container">
  <h2 id="orderTitle">📋 My Orders: <span id="length">0</span></h2>

  <div id="order">
    <!-- fetch order items -->   
      
  <div class="loading">Loading orders...</div>

  </div>
      
</main>
   

    <script>
  const LOCALHOST = "http://localhost:3000/orders";
const SERVER = "https://sadharon-store-server.vercel.app/orders";
  const isLocal = ["localhost", "127.0.0.1", ""].includes(window.location.hostname);
  const API = isLocal ? LOCALHOST : SERVER;
const list = document.getElementById("order");

      // ডাইনামিক আইকন থাকলে তা সক্রিয় করা
      if(window.lucide) lucide.createIcons();
      // ১. কার্ট সংখ্যা আপডেট (ব্যাক বাটন সাপোর্ট সহ)
  function calMyCart() {
    const myCartEle = document.getElementById("myCart");
      const topCart = document.getElementById("count")
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = cart.reduce((acc, item) => acc + (item.quantity || 0), 0);
    
    myCartEle.innerHTML = total;
    topCart.innerHTML= total;
      }

  window.addEventListener('pageshow', function(event) {
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
      calMyCart();
    }
  });
    
calMyCart()
    
  
// ৩. Load Products (Orders)
function loadProducts() {
    const token = localStorage.getItem("token");
    // ইউজার লগইন না থাকলে চেক
    if (!token) {
        document.getElementById("orderTitle").innerHTML = ""
             list.innerHTML = `
            <div style="
                text-align: center; 
                padding: 40px 20px; 
                border: 1px solid #ddd; 
                border-radius: 10px; 
                background-color: #f9f9f9; 
                max-width: 500px; 
                margin: 20px auto;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            ">
                <h2 style="color: #333; margin-bottom: 15px;">অর্ডার ট্রাক করতে লগইন করুন</h2>
                <p style="color: #666; font-size: 17px; margin-bottom: 20px;">
                    আপনার অর্ডারের বর্তমান অবস্থা জানতে অনুগ্রহ করে আগে লগইন করুন।
                </p>
                <a href="login.html?view-order" style="
                    text-decoration: none; 
                    background-color: #007bff; 
                    color: white; 
                    padding: 10px 25px; 
                    border-radius: 5px; 
                    display: inline-block;
                    font-weight: bold;
                ">লগইন পেজে যান</a>
            </div>
        `;
        return;
    }

 // ব্যাকএন্ড থেকে ডাটা ফেচ করা
fetch(API, {
    headers: { "Authorization": `Bearer ${token}` }
})
.then(res => res.json())
.then(response => {
    // আপনার কাস্টম লজিক: যদি JWT বা টোকেনে সমস্যা থাকে
    if (response?.jwt === "error") {
list.innerHTML = `
          <div style="
                text-align: center; 
                padding: 40px 20px; 
                border: 1px solid #ddd; 
                border-radius: 10px; 
                background-color: #f9f9f9; 
                max-width: 500px; 
                margin: 20px auto;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            ">
                <h2 style="color: #333; margin-bottom: 15px;"> ত্রুটি</h2>
                <p style="color: red; font-size: 17px; margin-bottom: 20px;">
                   ${response.message}
                </p>
                <a href="login.html?view-order" style="
                    text-decoration: none; 
                    background-color: #007bff; 
                    color: white; 
                    padding: 10px 25px; 
                    border-radius: 5px; 
                    display: inline-block;
                    font-weight: bold;
                ">লগইন করুন</a>
            </div>
        `;

         return;
    }
              // আপনার ব্যাকএন্ড থেকে ডাটা 'data' প্রপার্টিতে আসে
            const orders = response.data || [];
            const lengthElement = document.getElementById("length");
            
            if (lengthElement) lengthElement.innerHTML = orders.length;

            if (orders.length === 0) {
                list.innerHTML = `
             <div style="
    max-width: 450px; 
    margin: 50px auto; 
    padding: 30px; 
    background: rgba(255, 255, 255, 0.8); 
    backdrop-filter: blur(10px); 
    border-radius: 20px; 
    box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
    text-align: center; 
    font-family: 'Hind Siliguri', sans-serif;
    border: 1px solid rgba(255, 255, 255, 0.3);">

    <div style="font-size: 50px; margin-bottom: 15px;">🛍️</div>
    
    <h3 style="color: #333; margin-bottom: 10px;">আপনার অর্ডার লিস্টটি খালি</h3>
    
    <p style="color: #666; font-size: 17px; line-height: 1.6; margin-bottom: 25px;">
        সফলভাবে অর্ডার সম্পন্ন করতে প্রথমেই পছন্দের পণ্যগুলো কার্টে যোগ করুন।
    </p>

    <a href="add-to-cart.html" style="
        display: inline-block; 
        padding: 12px 25px; 
        background: linear-gradient(135deg, #6e8efb, #a777e3); 
        color: white; 
        text-decoration: none; 
        border-radius: 30px; 
        font-weight: bold; 
        transition: transform 0.3s ease;
        box-shadow: 0 4px 15px rgba(110, 142, 251, 0.4);">
        পণ্য যোগ করতে এখানে যান
    </a>
</div>
    `;
                return;
            }

            list.innerHTML = "";

            // নতুন অর্ডারগুলো লুপ চালিয়ে রেন্ডার করা
            orders.forEach(p => {
                // প্রতিটি অর্ডারের ভেতরের আইটেমগুলোর (Batch Items) জন্য HTML তৈরি
                let itemsHTML = "";
                if (p.items && Array.isArray(p.items)) {
                    p.items.forEach(item => {
                        itemsHTML += `
                        <div class="item-row" style="display: flex; gap: 10px; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 5px;">
                            <img src="${item.image}" alt="${item.name}" style="width: 50px; height: 50px; border-radius: 5px; object-fit: cover;">
                            <div class="item-info" style="flex-grow: 1;">
                                <h4 style="margin: 0; font-size: 14px;">${item.name}</h4>
                                <p style="margin: 0; font-size: 12px; color: #666;">Price: ৳${item.price} | Qty: ${item.quantity}</p>
                            </div>
                            <strong style="font-size: 14px;">৳${item.price * item.quantity}</strong>
                        </div>
                        `;
                    });
                }

                // মেইন অর্ডার কার্ড রেন্ডার
                list.innerHTML += `
                <div class="order-card" style="border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                    <div class="order-header" style="display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px;">
                        <div>
                            <span class="customer-name" style="font-weight: bold; display: block; color: #333;">${p.customerName}</span>
                            <span class="order-id" style="font-size: 11px; color: #777;">ID: #${p._id ? p._id.slice(-6).toUpperCase() : 'N/A'} | 📞 ${p.customerPhone}</span>
                            <p class="address" style="font-size: 12px; margin: 5px 0 0 0; color: #555;">📍 ${p.customerAddress}</p>
                        </div>
                        <div style="text-align: right; font-size: 12px; color: #888;">
                            ${p.orderDate || 'N/A'} <br> 
                            <span style="
                                display: inline-block; 
                                padding: 2px 8px; 
                                border-radius: 5px; 
                                margin-top: 5px;
                                background: ${p.status === 'pending' ? '#e3f2fd' : '#fff3e0'};
                                color: ${p.status === 'pending' ? 'blue' : '#e67e22'};
                                font-weight: bold;
                                text-transform: capitalize;
                                font-size: 11px;
                            ">${p.status}</span>
                        </div>
                    </div>

                    <div class="order-items-container">
                        ${itemsHTML} 
                    </div>

                    <div class="order-footer" style="margin-top: 10px; text-align: right; border-top: 1px solid #eee; padding-top: 10px;">
                        <div class="total-price" style="font-size: 16px; font-weight: bold; color: #2c3e50;">
                            Grand Total: ৳${p.totalAmount}
                        </div>
                        <div style="font-size: 11px; color: ${p.pay === 'paid' ? '#27ae60' : '#c0392b'}; margin-top: 5px; font-weight: 500;">
                            PAYMENT: ${p.pay ? p.pay.toUpperCase() : 'PENDING'}
                        </div>
                    </div>
                </div>
                `;
            });
        })
        .catch(err => {
            console.error("❌ Fetch error:", err);
    list.innerHTML = `
          <div style="
                text-align: center; 
                padding: 40px 20px; 
                border: 1px solid #ddd; 
                border-radius: 10px; 
                background-color: #f9f9f9; 
                max-width: 500px; 
                margin: 20px auto;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            ">
                <h2 style="color: #333; margin-bottom: 15px;"> ত্রুটি</h2>
                <p style="color: red; font-size: 17px; margin-bottom: 20px;">
                   নেটওয়ার্ক সমস্যা! দয়া করে ইন্টারনেট কানেকশন চেক করে আবার চেষ্টা করুন। ${err.message}
                </p>
                <a href="login.html?view-order" style="
                    text-decoration: none; 
                    background-color: #007bff; 
                    color: white; 
                    padding: 10px 25px; 
                    border-radius: 5px; 
                    display: inline-block;
                    font-weight: bold;
                ">লগইন করুন</a>
            </div>
        `; });
}

// ফাংশনটি কল করা
loadProducts();

    
    </script>
</body>
</html>
