<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Sadharon Store | Premium Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
   <link rel="stylesheet"href="css/index.css">
  <style>
  
  main {
    padding: 35px 0 80px;
    margin-bottom: 100px !important;
  }
  h2{
  margin-bottom:15px;
}

/* Cart Item */
.cart-item{
  display:flex;
  gap:15px;
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  align-items:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
}
.cart-item img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}
.cart-info{
  flex:1;
}
.cart-info h4{
  margin-bottom:6px;
}
.cart-info p{
  margin:4px 0;
  color:#555;
}

/* Quantity */
.qty{
  display:flex;
  align-items:center;
  gap:8px;
}
.qty button{
  width:26px;
  height:26px;
  border:none;
  background:#1e90ff;
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}
.qty span{
  font-weight:bold;
}

/* Remove */
.remove{
  color:#ff4757;
  cursor:pointer;
  font-size:14px;
  display: inline-block;
  margin-top: 13px;
}

/* Summary */
.summary{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
}
.summary p{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:16px;
}
.summary .total{
  font-size:20px;
  font-weight:bold;
}

/* Checkout */
.checkout-btn{
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#1e90ff;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}
.checkout-btn:hover{
  background:#187bcd;
}

/* Empty */
.empty{
  text-align:center;
  color:#777;
  margin-top:40px;
}
  
  </style>
</head>
<body>   
     <header>
        <div class="container nav-flex"><div onclick="window.location.href='/'"  class="logo">Sadharon<span>Store</span></div><a class="help" href="help.html">? সহায়তা</a><div onclick="window.location.href='add-to-cart.html'" id="cart-count-display" style="background: #1e293b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;"><i data-lucide="shopping-cart" style="width: 14px; vertical-align: middle;"></i> <span id="count">0</span></div></div>
    </header>
    <!-- bottom nav section -->
    <section class="bottom-nav">
      <a href="/" class="bottom-link"><i data-lucide="home"></i><span>হোম</span></a>
      <a href="category.html" class="bottom-link"><i data-lucide="grid"></i><span>ক্যাটাগরি</span></a>
      <div class="bottom-link main-cart">
        <div onclick="window.location.href='add-to-cart.html'" class="cart-btn-inner cart-active">
          <i data-lucide="shopping-bag"></i>
          <span id="myCart" class="cart-badge">0</span>
        </div>
           <span>আমার কার্ট</span>
      </div>      
      <a href="view-order.html" class="bottom-link">  <i data-lucide="package"></i> <span>আমার অর্ডার</span></a>
      <a href="profile.html" class="bottom-link"><i data-lucide="user"></i><span>প্রোফাইল</span></a>
    </section>    
  

  
<main class="container">
  <h2>🛒 My Cart</h2>

  <div id="cartList"></div>

  <div class="summary" id="summary" style="display:none;">
    <p><span>Subtotal</span><span id="subtotal"></span></p>
    <p><span>Delivery</span><span>Free</span></p>
    <p class="total"><span>Total</span><span id="total"></span></p>

    <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">অর্ডার নিশ্চিত করুন</button>
  </div>

<div id="empty" style="
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    max-width: 450px; 
    padding: 30px; 
    background: rgba(255, 255, 255, 0.7); 
    backdrop-filter: blur(15px); 
    border-radius: 24px; 
    border: 1px solid rgba(255, 255, 255, 0.4); 
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); 
    max-width: 500px; 
    margin: 40px auto; 
    text-align: center;">

    <div style="
        font-size: 68px; 
        margin-bottom: 16px; 
        filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));">
        🛒
    </div>

    <h2 style="
        font-family: 'Hind Siliguri', sans-serif; 
        font-size: 20px;
      color: #1a1a1a; 
        margin-bottom: 10px; 
        font-weight: 700;">
        আপনার কার্ট বর্তমানে খালি!
    </h2>

    <p style="
        font-family: 'Hind Siliguri', sans-serif; 
        color: #636e72; 
        font-size: 17px; 
        line-height: 1.6; 
        margin-bottom: 30px; 
        padding: 0 10px;">
        অর্ডার শুরু করতে প্রথমে আপনার পছন্দের পণ্যগুলো নির্বাচন করে কার্টে যোগ করুন।
    </p>

    <a href="index.html" style="
        display: inline-block; 
        padding: 14px 40px; 
        background: linear-gradient(135deg, #00b894, #00cec9); 
        color: #ffffff; 
        text-decoration: none; 
        border-radius: 50px; 
        font-weight: 600; 
        font-family: 'Hind Siliguri', sans-serif; 
        transition: all 0.3s ease; 
        box-shadow: 0 6px 20px rgba(0, 184, 148, 0.3); 
        letter-spacing: 0.5px;">
        কেনাকাটা শুরু করুন
    </a>
</div>

</main>


    <script>
  
    // ১. এপিআই ইউআরএল কনফিগারেশন
const LOCALHOST = "http://localhost:3000/orders";
const SERVER = "https://sadharon-store-server.vercel.app/orders";
  const isLocal = ["localhost", "127.0.0.1", ""].includes(window.location.hostname);
  const API = isLocal ? LOCALHOST : SERVER;

      // ডাইনামিক আইকন থাকলে তা সক্রিয় করা
      if(window.lucide) lucide.createIcons();
      // ১. কার্ট সংখ্যা আপডেট (ব্যাক বাটন সাপোর্ট সহ)
  function calMyCart() {
    const myCartEle = document.getElementById("myCart");
      const topCart = document.getElementById("count")
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = cart.reduce((acc, item) => acc + (item.quantity || 0), 0);
    
    myCartEle.innerHTML = total;
    topCart.innerHTML= total;
      }

  window.addEventListener('pageshow', function(event) {
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
      calMyCart();
    }
  });
    
calMyCart();
  
  

// ২. লোকাল স্টোরেজ থেকে ডাটা লোড করা
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const list = document.getElementById("cartList");
const summary = document.getElementById("summary");
const empty = document.getElementById("empty");

/**
 * ৩. কার্ট রেন্ডার করার ফাংশন
 * এটি চেক করে কার্ট খালি কি না, খালি থাকলে empty div দেখায়।
 */
function renderCart() {
  list.innerHTML = "";
  let subtotal = 0;

  // কার্ট খালি থাকলে অ্যালার্ট না দিয়ে সরাসরি মেসেজ দেখানো
  if (!cart || cart.length === 0) {
    summary.style.display = "none";
    empty.style.display = "block";
    return;
  }

  // কার্ট খালি না থাকলে লিস্ট দেখানো
  empty.style.display = "none";
  summary.style.display = "block";

  cart.forEach((item, index) => {
    const itemTotal = item.price * item.quantity;
    subtotal += itemTotal;

    list.innerHTML += `
      <div class="cart-item" style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
        <img src="${item.image}" alt="${item.name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
        <div class="cart-info" style="flex-grow: 1;">
          <h4 style="margin: 0;">${item.name}</h4>
          <p style="margin: 5px 0; color: #666;">Price: ৳${item.price}</p>
          <div class="qty" style="display: flex; align-items: center; gap: 10px;">
            <button onclick="changeQty(${index}, -1)" style="padding: 2px 8px;">-</button>
            <span>${item.quantity}</span>
            <button onclick="changeQty(${index}, 1)" style="padding: 2px 8px;">+</button>
          </div>
          <span class="remove" onclick="removeItem(${index})" style="color: red; cursor: pointer; font-size: 14px; display: block;">Remove</span>
        </div>
        <strong>৳${itemTotal}</strong>
      </div>
    `;
  });

  document.getElementById("subtotal").innerText = "৳" + subtotal;
  document.getElementById("total").innerText = "৳" + subtotal;
}

/**
 * ৪. কোয়ান্টিটি পরিবর্তন লজিক
 */
function changeQty(index, change) {
  cart[index].quantity += change;
  if (cart[index].quantity <= 0) {
    cart.splice(index, 1);
  }
  updateCart();
}

/**
 * ৫. কার্ট থেকে আইটেম রিমুভ করা
 */
function removeItem(index) {
  const isConfirmed = confirm("Remove item from my cart?");
  if (isConfirmed) {
    cart.splice(index, 1);
    updateCart();
  }
}

/**
 * ৬. লোকাল স্টোরেজ আপডেট এবং সিঙ্ক্রোনাইজেশন
 */
function updateCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
  // যদি আপনার নেভিগেশন বারে কার্ট কাউন্টার থাকে (index.js এ)
  if (typeof calMyCart === "function") calMyCart();
}

/**
 * ৭. চেকআউট লজিক (Backend Integration)
 */
  function errorPrint (message) {    
    
      summary.style.display = "none";
    empty.style.display = "none";
  list.innerHTML = `
       <div style="
                text-align: center; 
                padding: 40px 20px; 
                border: 1px solid #ddd; 
                border-radius: 10px; 
                background-color: #f9f9f9; 
                max-width: 500px; 
                margin: 20px auto;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            ">
                <h2 style="color: #333; margin-bottom: 15px;"> ত্রুটি</h2>
                <p style="color: red; font-size: 17px; margin-bottom: 20px;">
                   ${message}
                </p>
                <a href="login.html?page=add-to-cart" style="
                    text-decoration: none; 
                    background-color: #007bff; 
                    color: white; 
                    padding: 10px 25px; 
                    border-radius: 5px; 
                    display: inline-block;
                    font-weight: bold;
                ">লগইন করুন</a>
            </div>
  `
    

    
  }
  
async function checkout() {
  
  const btn = document.getElementById('checkoutBtn');
  
  const userId = localStorage.getItem("token"); // আপনার টোকেনই যদি userId হয়
  if (!userId || userId.length < 10) {
    alert("অর্ডার করতে হলে লগইন করুন?");
    window.location.href = "login.html?page=page=add-to-cart";
    return;
  }

  // যদি কার্ট খালি থাকে তবে কিছুই হবে না, শুধু রি-রেন্ডার হবে
 if (!cart || cart.length === 0) {
   renderCart();
   return;
  }

  const pay = confirm("Confirm your order?");

  if (!pay) { return }
    // ব্যাকএন্ডের রিকোয়ারমেন্ট অনুযায়ী অবজেক্ট তৈরি
    const orderData = {
      items: cart.map(item => ({
        productId: item.productId,
        quantity: item.quantity
      }))
    };

 try {
     btn.disabled = true;
  btn.innerText = " অর্ডার প্রসেসিং হচ্ছে...";

  const response = await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${userId}`,
    },
    body: JSON.stringify(orderData)
  });

  // ১. সরাসরি json() কল করার আগে রেসপন্স টাইপ চেক করা ভালো
  const data = await response.json();
// ২. শুধুমাত্র 'ok' (status 200-299) এবং 'success' হলেই কার্ট মুছুন
  if (response.ok && data.status === "success") {
    
    alert(data.message || "অর্ডার সফল হয়েছে!");

    // অর্ডার সফল হলেই কেবল কার্ট ক্লিয়ার হবে
    localStorage.removeItem("cart");
    cart = [];
    
    // UI আপডেট
    renderCart();
    calMyCart();

  } 
  // ৩. টোকেন বা অথরাইজেশন এরর হ্যান্ডলিং (status 401/403)
  else if (response.status === 401 || response.status === 403 || data.jwt === "error") {
    // এখানে কার্ট মোছা হবে না, ইউজারকে লগইন করতে বলা হবে
    errorPrint(data.message || "আপনার সেশন শেষ হয়ে গেছে। দয়া করে আবার লগইন করুন।");
    
  } 
  // ৪. অন্য যেকোনো এরর (যেমন: ৪০০ বা ৫০০ স্ট্যাটাস)
  else {
    errorPrint(data.message || "অর্ডার প্রক্রিয়াকরণ করা যায়নি। আবার চেষ্টা করুন।");
  }
     
} catch (err) {
  // ২. নেটওয়ার্ক ফেইলুর বা JSON পার্সিং এরর এখানে আসবে
  console.error("Fetch Error:", err);
    errorPrint(`নেটওয়ার্ক সমস্যা! দয়া করে ইন্টারনেট কানেকশন চেক করে আবার চেষ্টা করুন। ${err.message}`)             
  
} finally {
  btn.disabled = false;
  btn.innerText = "অর্ডার নিশ্চিত করুন";
}       
}
// ৮. পেজ লোড হলে কার্ট রেন্ডার করা
renderCart();
    
  </script>
</body>
</html>
