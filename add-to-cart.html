<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadharon Store | Premium Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
   <link rel="stylesheet"href="css/index.css">
  <style>
  
  main {
    padding: 35px 0 80px;
  }
  h2{
  margin-bottom:15px;
}

/* Cart Item */
.cart-item{
  display:flex;
  gap:15px;
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  align-items:center;
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
}
.cart-item img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}
.cart-info{
  flex:1;
}
.cart-info h4{
  margin-bottom:6px;
}
.cart-info p{
  margin:4px 0;
  color:#555;
}

/* Quantity */
.qty{
  display:flex;
  align-items:center;
  gap:8px;
}
.qty button{
  width:26px;
  height:26px;
  border:none;
  background:#1e90ff;
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}
.qty span{
  font-weight:bold;
}

/* Remove */
.remove{
  color:#ff4757;
  cursor:pointer;
  font-size:14px;
  display: inline-block;
  margin-top: 13px;
}

/* Summary */
.summary{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:20px;
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
}
.summary p{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:16px;
}
.summary .total{
  font-size:20px;
  font-weight:bold;
}

/* Checkout */
.checkout-btn{
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#1e90ff;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}
.checkout-btn:hover{
  background:#187bcd;
}

/* Empty */
.empty{
  text-align:center;
  color:#777;
  margin-top:40px;
}
  
  </style>
</head>
<body>   
    <header>
        <div class="container nav-flex"><div onclick="window.location.href='index.html'"  class="logo">Sadharon<span>Store</span></div><div onclick="window.location.href='add-to-cart.html'" id="cart-count-display" style="background: #1e293b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;"><i data-lucide="shopping-cart" style="width: 14px; vertical-align: middle;"></i> <span id="count">0</span></div></div>
    </header>
    <!-- bottom nav section -->
    <section class="bottom-nav">
      <a href="index.html" class="bottom-link"><i data-lucide="home"></i><span>হোম</span></a>
      <a href="#category" class="bottom-link"><i data-lucide="grid"></i><span>ক্যাটাগরি</span></a>
      <div class="bottom-link main-cart">
        <div onclick="window.location.href='add-to-cart.html'" class="cart-btn-inner cart-active">
          <i data-lucide="shopping-bag"></i>
          <span id="myCart" class="cart-badge">0</span>
        </div>
      </div>      
      <a href="view-order.html" class="bottom-link">  <i data-lucide="package"></i> <span>আমার অর্ডার</span></a>
      <a href="setting.html" class="bottom-link"><i data-lucide="user"></i><span>প্রোফাইল</span></a>
    </section>    

  
<main class="container">
  <h2>🛒 My Cart</h2>

  <div id="cartList"></div>

  <div class="summary" id="summary" style="display:none;">
    <p><span>Subtotal</span><span id="subtotal"></span></p>
    <p><span>Delivery</span><span>Free</span></p>
    <p class="total"><span>Total</span><span id="total"></span></p>

    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
  </div>

  <div class="empty" id="empty">
    <p>Your cart is empty</p>
  </div>
</main>


    <script>
  
    // ১. এপিআই ইউআরএল কনফিগারেশন
const LOCALHOST = "http://localhost:3000/orders";
const SERVER = "https://sadharon-store-server.vercel.app/orders";
const API = window.location.hostname.includes("vercel") ? SERVER : LOCALHOST;

      // ডাইনামিক আইকন থাকলে তা সক্রিয় করা
      if(window.lucide) lucide.createIcons();
      // ১. কার্ট সংখ্যা আপডেট (ব্যাক বাটন সাপোর্ট সহ)
  function calMyCart() {
    const myCartEle = document.getElementById("myCart");
      const topCart = document.getElementById("count")
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = cart.reduce((acc, item) => acc + (item.quantity || 0), 0);
    
    myCartEle.innerHTML = total;
    topCart.innerHTML= total;
      }

  window.addEventListener('pageshow', function(event) {
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
      calMyCart();
    }
  });
    
calMyCart();
  
  

// ২. লোকাল স্টোরেজ থেকে ডাটা লোড করা
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const list = document.getElementById("cartList");
const summary = document.getElementById("summary");
const empty = document.getElementById("empty");

/**
 * ৩. কার্ট রেন্ডার করার ফাংশন
 * এটি চেক করে কার্ট খালি কি না, খালি থাকলে empty div দেখায়।
 */
function renderCart() {
  list.innerHTML = "";
  let subtotal = 0;

  // কার্ট খালি থাকলে অ্যালার্ট না দিয়ে সরাসরি মেসেজ দেখানো
  if (!cart || cart.length === 0) {
    summary.style.display = "none";
    empty.style.display = "block";
    return;
  }

  // কার্ট খালি না থাকলে লিস্ট দেখানো
  empty.style.display = "none";
  summary.style.display = "block";

  cart.forEach((item, index) => {
    const itemTotal = item.price * item.quantity;
    subtotal += itemTotal;

    list.innerHTML += `
      <div class="cart-item" style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
        <img src="${item.image}" alt="${item.name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
        <div class="cart-info" style="flex-grow: 1;">
          <h4 style="margin: 0;">${item.name}</h4>
          <p style="margin: 5px 0; color: #666;">Price: ৳${item.price}</p>
          <div class="qty" style="display: flex; align-items: center; gap: 10px;">
            <button onclick="changeQty(${index}, -1)" style="padding: 2px 8px;">-</button>
            <span>${item.quantity}</span>
            <button onclick="changeQty(${index}, 1)" style="padding: 2px 8px;">+</button>
          </div>
          <span class="remove" onclick="removeItem(${index})" style="color: red; cursor: pointer; font-size: 14px; display: block; mt: 5px;">Remove</span>
        </div>
        <strong>৳${itemTotal}</strong>
      </div>
    `;
  });

  document.getElementById("subtotal").innerText = "৳" + subtotal;
  document.getElementById("total").innerText = "৳" + subtotal;
}

/**
 * ৪. কোয়ান্টিটি পরিবর্তন লজিক
 */
function changeQty(index, change) {
  cart[index].quantity += change;
  if (cart[index].quantity <= 0) {
    cart.splice(index, 1);
  }
  updateCart();
}

/**
 * ৫. কার্ট থেকে আইটেম রিমুভ করা
 */
function removeItem(index) {
  const isConfirmed = confirm("Remove item from my cart?");
  if (isConfirmed) {
    cart.splice(index, 1);
    updateCart();
  }
}

/**
 * ৬. লোকাল স্টোরেজ আপডেট এবং সিঙ্ক্রোনাইজেশন
 */
function updateCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
  // যদি আপনার নেভিগেশন বারে কার্ট কাউন্টার থাকে (index.js এ)
  if (typeof calMyCart === "function") calMyCart();
}

/**
 * ৭. চেকআউট লজিক (Backend Integration)
 */
async function checkout() {
  const userId = localStorage.getItem("token"); // আপনার টোকেনই যদি userId হয়

  if (!userId) {
    alert("Please login to order products.");
    window.location.href = "login.html";
    return;
  }

  // যদি কার্ট খালি থাকে তবে কিছুই হবে না, শুধু রি-রেন্ডার হবে
  if (!cart || cart.length === 0) {
    renderCart();
    return;
  }

  const pay = confirm("Confirm your order?");

  if (pay) {
    // ব্যাকএন্ডের রিকোয়ারমেন্ট অনুযায়ী অবজেক্ট তৈরি
    const orderData = {
      userId: userId,
      items: cart.map(item => ({
        productId: item.productId,
        quantity: item.quantity
      }))
    };

    try {
      const response = await fetch(API, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(orderData)
      });

      const data = await response.json();

      if (response.ok && data.status === "success") {
        alert("✅ Order placed successfully!");

        // অর্ডার শেষে কার্ট ক্লিয়ার করা
        localStorage.removeItem("cart");
        cart = [];
        renderCart(); // এটি কল করলে অটোমেটিক "Empty" মেসেজ দেখাবে
        if (typeof calMyCart === "function") calMyCart();

        // চাইলে ইউজারকে ড্যাশবোর্ডে পাঠাতে পারেন
        // window.location.href = "orders.html";
      } else {
        alert("❌ Server Error: " + (data.message || "Failed to place order"));
      }
    } catch (err) {
      console.error(err);
      alert("Network error. Is your server running?");
    }
  }
}

// ৮. পেজ লোড হলে কার্ট রেন্ডার করা
renderCart();
    
    </script>
</body>
</html>
