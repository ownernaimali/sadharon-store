<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sadharon Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/index.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #f1f5f9; padding-bottom: 80px; }
        
        .form-container { max-width: 500px; margin: 20px auto 80px; padding: 0 15px; }

        .form-card {
            background: white; padding: 25px; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569; }
        
        input {
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px;
            outline: none; transition: 0.3s; font-size: 15px;
        }
        input:focus { border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1); }

        .pass-wrapper { position: relative; }
        #togglePass {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            font-size: 12px; font-weight: 700; color: #FF6B35; cursor: pointer;
            user-select: none; text-transform: uppercase;
        }

        .confirm-btn {
            background: #1e293b; color: white; border: none; width: 100%;
            padding: 15px; border-radius: 8px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .confirm-btn:hover { background: #0f172a; }
        .confirm-btn:disabled { background: #94a3b8; cursor: not-allowed; }

        #message {
            margin-top: 15px; padding: 12px; border-radius: 8px;
            font-size: 14px; text-align: center; display: none;
        }
        .msg-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; display: block !important; }
        .msg-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block !important; }
    </style>
</head>
<body>   
    <header>
        <div class="container nav-flex"><div onclick="window.location.href='/'"  class="logo">Sadharon<span>Store</span></div><a class="help" href="help.html">? সহায়তা</a><div onclick="window.location.href='add-to-cart.html'" id="cart-count-display" style="background: #1e293b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;"><i data-lucide="shopping-cart" style="width: 14px; vertical-align: middle;"></i> <span id="count">0</span></div></div>
    </header>
    <!-- bottom nav section -->
    <section class="bottom-nav">
      <a href="/" class="bottom-link"><i data-lucide="home"></i><span>হোম</span></a>
      <a href="/category.html" class="bottom-link"><i data-lucide="grid"></i><span>ক্যাটাগরি</span></a>
      <div class="bottom-link main-cart">
        <div onclick="window.location.href='/add-to-cart.html'" class="cart-btn-inner">
          <i data-lucide="shopping-bag"></i>
          <span id="myCart" class="cart-badge">0</span>
        </div>
           <span>আমার কার্ট</span>
      </div>      
      <a href="view-order.html" class="bottom-link">  <i data-lucide="package"></i> <span>আমার অর্ডার</span></a>
      <a href="profile.html" class="bottom-link active"><i data-lucide="user"></i><span>প্রোফাইল</span></a>
    </section>    

    <div class="form-container"> 
        <div style="background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
            <i data-lucide="info" style="color: #64748b; width: 20px;"></i>
            <p style="color: #475569; font-size: 15px; font-weight: 500; margin: 0;">
                অর্ডার করতে হলে আগে আপনার অ্যাকাউন্টটি যাছাই করুন।
            </p>
        </div>

        <form class="form-card" id="loginForm">
            <h2 style="text-align:center; margin-bottom: 5px; color: #1e293b; font-size: 20px;">লগইন করুন</h2>
            <p style="text-align:center; margin-bottom: 20px; font-size: 15px; color: #64748b;">
                অ্যাকাউন্ট নেই? 
                <a href="signup.html" style="color: #FF6B35; font-weight: 600; text-decoration: none;">নিবন্ধন করুন</a>
            </p>

            <div class="form-group">
                <label>ফোন নম্বর</label>
                <input type="tel" id="phone" placeholder="০১৭XXXXXXXX" required>
            </div>

            <div class="form-group">
                <label>পাসওর্য়াড</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="********" required>
                    <span id="togglePass">Show</span>
                </div>
            </div>
            
            <div style="margin: 15px; text-align: right;">
    <a href="help.html#helpMessage" style="text-decoration: none; color: #64748b; font-size: 14px; font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 5px; transition: color 0.2s;" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#64748b'">
        <i data-lucide="help-circle" style="width: 14px;"></i>
        <span>পাসওয়ার্ড ভুলে গেছেন?</span>
    </a>
</div>
            
            <p id="message"></p>

            <button id="submitBtn" type="submit" class="confirm-btn">লগইন করুন</button>
        </form>
    </div>


    <script>
        // 1. API & URL Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page');

        const LOCALHOST = "http://localhost:3000/login";
        const SERVER = "https://sadharon-store-server.vercel.app/login";
          const isLocal = ["localhost", "127.0.0.1", ""].includes(window.location.hostname);
  const API = isLocal ? LOCALHOST : SERVER;

        if(window.lucide) lucide.createIcons();

        // 2. Show/Hide Password
        const passwordInput = document.getElementById("password");
        const toggleBtn = document.getElementById("togglePass");

        toggleBtn.addEventListener("click", () => {
            const isPass = passwordInput.type === "password";
            passwordInput.type = isPass ? "text" : "password";
            toggleBtn.textContent = isPass ? "Hide" : "Show";
        });

        // 3. Update Cart Function
        function calMyCart() {
            const myCartEle = document.getElementById("myCart");
            const topCart = document.getElementById("count");
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            let total = cart.reduce((acc, item) => acc + (item.quantity || 0), 0);
            if(myCartEle) myCartEle.innerHTML = total;
            if(topCart) topCart.innerHTML = total;
        }
        calMyCart();

        // 4. Login Functionality
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const msgElement = document.getElementById('message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const loginData = {
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value
            };

            // Loading state
            submitBtn.innerText = "যাচাই করা হচ্ছে...";
            submitBtn.disabled = true;
            msgElement.style.display = "none";
            msgElement.className = "";

            try {
                const response = await fetch(API, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(loginData)
                });

                const result = await response.json();

                if (result.success) {
                    msgElement.innerText = "লগইন সফল! কিছুক্ষণ অপেক্ষা করুন...";
                    msgElement.classList.add("msg-success");
                    // Save info
                     
                    if(!result.token) {
                        alert("Token get problem. Please try again?")
                        window.location.reload()
                        return;
                    }
                      localStorage.setItem("token", result.token);
                     // Redirect
                    setTimeout(() => {
                       window.location.href = page ? `${page}.html` : "/";
                    }, 1000);

                } else {
                    msgElement.innerText = "ব্যর্থ: " + result.message;
                    msgElement.classList.add("msg-error");
                    submitBtn.innerText = "লগইন করুন";
                    submitBtn.disabled = false;
                }
            } catch (error) {
                msgElement.innerText = "সার্ভারের সাথে সংযোগ বিচ্ছিন্ন হয়েছে।";
                msgElement.classList.add("msg-error");
                submitBtn.innerText = "লগইন করুন";
                submitBtn.disabled = false;
            }
        });

        window.addEventListener('pageshow', (event) => {
            if (event.persisted) calMyCart();
        });
    </script>
</body>
</html>
