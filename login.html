<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadharon Store | Premium Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
   <link rel="stylesheet"href="css/index.css">
    <style>
    
      /*. CLEAN LOGIN PAGE STYLES */
.login-page {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f1f5f9;
  padding: 15px;
}

.login-container {
  background: white;
  width: 100%;
  max-width: 550px;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
}

.login-header {
  text-align: center;
  margin-bottom: 30px;
}

.back-home {
  display: inline-block;
  margin-bottom: 15px;
  font-size: 13px;
  color: #64748b;
  text-decoration: none;
  font-weight: 600;
}

.back-home:hover { color: #FF6B35; }

.login-logo {
  color: #FF6B35;
  font-size: 26px;
  font-weight: 800;
  margin-bottom: 5px;
}

.login-header p {
  color: #64748b;
  font-size: 14px;
}

.input-group {
  margin-bottom: 20px;
}

.input-group label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #1e293b;
}

.label-row {
  display: flex;
  justify-content: space-between;
}

.forgot-link {
  font-size: 12px;
  color: #FF6B35;
  text-decoration: none;
}

.input-wrapper input {
  width: 100%;
  padding: 12px 16px; /* Balanced padding without icons */
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-size: 15px;
  background: #fff;
}

.input-wrapper input:focus {
  outline: none;
  border-color: #FF6B35;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 25px;
}

.btn-login-submit {
  width: 100%;
  background: #FF6B35;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
}

.btn-login-submit:hover {
  background: #e55a2b;
}

.login-footer {
  text-align: center;
  margin-top: 25px;
  font-size: 14px;
  color: #64748b;
}

.login-footer a {
  color: #FF6B35;
  text-decoration: none;
  font-weight: 600;
}
    </style>
</head>
<body>   
    <header>
        <div class="container nav-flex"><div onclick="window.location.href='index.html'"  class="logo">Sadharon<span>Store</span></div><div onclick="window.location.href='add-to-cart.html'" id="cart-count-display" style="background: #1e293b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;"><i data-lucide="shopping-cart" style="width: 14px; vertical-align: middle;"></i> <span id="count">0</span></div></div>
    </header>
    <!-- bottom nav section -->
    <section class="bottom-nav">
      <a href="index.html" class="bottom-link"><i data-lucide="home"></i><span>হোম</span></a>
      <a href="index.html" class="bottom-link"><i data-lucide="grid"></i><span>ক্যাটাগরি</span></a>
      <div class="bottom-link main-cart">
        <div onclick="window.location.href='add-to-cart.html'" class="cart-btn-inner">
          <i data-lucide="shopping-bag"></i>
          <span id="myCart" class="cart-badge">0</span>
        </div>
      </div>      
      <a href="view-order.html" class="bottom-link">  <i data-lucide="package"></i> <span>আমার অর্ডার</span></a>
      <a href="profile.html" class="bottom-link active"><i data-lucide="user"></i><span>প্রোফাইল</span></a>
    </section>    

<main class="container" style="line-height: 1.6;"> 

<div class="login-page">
  <div class="login-container">
    <div class="login-header">
      <a href="index.html" class="back-home">Back to Home</a>
      <h1 class="login-logo">Sadharon Store</h1>
      <p>Welcome back! Please enter your details.</p>
    </div>

    <form id="loginForm" class="login-form">
      <div class="input-group">
        <label for="loginPhone">Phone Number</label>
        <div class="input-wrapper">
          <input type="tel" id="loginPhone" placeholder="01XXXXXXXXX" required>
        </div>
      </div>

      <div class="input-group">
        <div class="label-row">
          <label for="loginPassword">Password</label>
          <a href="#" class="forgot-link">Forgot?</a>
        </div>
        <div class="input-wrapper">
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </div>
      </div>

      <div class="remember-me">
        <input type="checkbox" id="remember">
        <label for="remember">Keep me logged in</label>
      </div>

      <button type="submit" id="loginBtn" class="btn-login-submit">Login</button>
    </form>

    <div class="login-footer">
      <p>Don't have an account? <a href="signup.html">Register Account</a></p>
    </div>
  </div>
</div>
   
</main>
   

    <script>
      const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
   const LOCALHOST = "http://localhost:3000/login";
  const SERVER = "https://sadharon-store-server.vercel.app/login";
    const API = window.location.hostname.includes("vercel") ? SERVER : LOCALHOST;

      // ডাইনামিক আইকন থাকলে তা সক্রিয় করা
      if(window.lucide) lucide.createIcons();
      // ১. কার্ট সংখ্যা আপডেট (ব্যাক বাটন সাপোর্ট সহ)
  function calMyCart() {
    const myCartEle = document.getElementById("myCart");
      const topCart = document.getElementById("count")
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = cart.reduce((acc, item) => acc + (item.quantity || 0), 0);
    
    myCartEle.innerHTML = total;
    topCart.innerHTML= total;
      }

  window.addEventListener('pageshow', function(event) {
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
      calMyCart();
    }
  });
    
calMyCart()
    
      
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    // 1. Gather data
    const loginData = {
      phone: document.getElementById('loginPhone').value,
      password: document.getElementById('loginPassword').value
    };

    // 2. UI Feedback: Disable button while waiting
    loginBtn.innerText = "Checking...";
    loginBtn.disabled = true;

    try {
      // 3. Send data to your Vercel Server
      const response = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(loginData)
      });

      const result = await response.json();

      if (result.success) {
        // 4. Success Alert
        alert(result.message);
        // Optional: Save user info to use on other pages
        if(!result.user.id) {
          return alert("please! try again later or contact us")
        }
        localStorage.setItem("token", result.user.id);
        
        // Redirect to home or dashboard
       window.location.href = "index.html"; 
      } else {
        // 5. Error Alert (from server message)
        alert("Login Failed: " + result.message);
      }
    } catch (error) {
      console.error("Login Error:", error);
      alert("Error connecting to server. Please try again later.");
    } finally {
      // Reset button state
      loginBtn.innerText = "Login";
      loginBtn.disabled = false;
    }
  });
  
    
    </script>
</body>
</html>
