<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadharon Store | Premium Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
   <link rel="stylesheet"href="css/index.css">
    <style>
body {
     padding-bottom: 88px
 }   
/* 11. SKELETON LOADING ANIMATION */
.skeleton-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

@media (min-width: 768px) {
    .skeleton-container {
        grid-template-columns: repeat(4, 1fr);
    }
}

.skeleton-card {
    background: #fff;
    border-radius: 12px;
    padding: 15px;
    border: 1px solid #f1f5f9;
}

.skeleton-img {
    width: 100%;
    aspect-ratio: 1/1;
    background: #e2e8f0;
    border-radius: 8px;
    margin-bottom: 15px;
}

.skeleton-text {
    height: 15px;
    background: #e2e8f0;
    border-radius: 4px;
    margin-bottom: 10px;
}

.skeleton-price {
    height: 20px;
    width: 50%;
    background: #e2e8f0;
    border-radius: 4px;
}

/* The Shimmer Effect */
.shimmer {
    position: relative;
    overflow: hidden;
}

.shimmer::after {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
    left: 0;
    transform: translateX(-100%);
    background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 0) 0,
        rgba(255, 255, 255, 0.5) 50%,
        rgba(255, 255, 255, 0) 100%
    );
    animation: shimmer 1.5s infinite;
}

@keyframes shimmer {
    100% { transform: translateX(100%); }
}

    
  /* PRODUCT GRID STYLES */
.product-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile */
    gap: 10px;
    padding: 20px 0;
}

@media (min-width: 768px) {
    .product-grid {
        grid-template-columns: repeat(4, 1fr); /* 4 columns on desktop */
        gap: 25px;
    }
}

.product-card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
    border: 1px solid #f1f5f9;
}

.product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.image-container {
    width: 100%;
    aspect-ratio: 1/1; /* Keeps image square */
    background: #f8fafc;
    overflow: hidden;
    position: relative;
}

.image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.discount-tag {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #FF6B35;
    color: white;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 800;
    border-radius: 4px;
    text-transform: uppercase;
}

.product-info {
    padding: 15px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.product-title {
    font-size: 15px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 8px;
    line-height: 1.4;
    height: 42px; /* Limits to 2 lines */
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
}

.price-section {
    margin-bottom: 12px;
}

.current-price {
    font-size: 24px;
    font-weight: 800;
    color: #FF6B35;
}

.old-price {
    font-size: 23px;
    color: #94a3b8;
    text-decoration: line-through;
    margin-left: 5px;
}
     
@media (min-width: 380px) {
 .current-price {
    font-size: 20px;
}
.old-price {
    font-size: 19px;    
}
}
     
@media (min-width: 470px) {
 .current-price {
    font-size: 22px;
}
.old-price {
    font-size: 21px;    
}
}


.add-btn {
    width: 100%;
    background: #111827;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.add-btn:hover {
    background: #FF6B35;
}    
    </style>
</head>
<body>   
    <header>
        <div class="container nav-flex"><div onclick="window.location.href='/'"  class="logo">Sadharon<span>Store</span></div><a class="help" href="help.html">? সহায়তা</a><div onclick="window.location.href='add-to-cart.html'" id="cart-count-display" style="background: #1e293b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;"><i data-lucide="shopping-cart" style="width: 14px; vertical-align: middle;"></i> <span id="count">0</span></div></div>
    </header>
    <!-- bottom nav section -->
    <section class="bottom-nav">
      <a href="/" class="bottom-link active"><i data-lucide="home"></i><span>হোম</span></a>
      <a href="/category.html" class="bottom-link"><i data-lucide="grid"></i><span>ক্যাটাগরি</span></a>
      <div class="bottom-link main-cart">
        <div onclick="window.location.href='/add-to-cart.html'" class="cart-btn-inner">
          <i data-lucide="shopping-bag"></i>
          <span id="myCart" class="cart-badge">0</span>
        </div>
           <span>আমার কার্ট</span>
      </div>      
      <a href="view-order.html" class="bottom-link">  <i data-lucide="package"></i> <span>আমার অর্ডার</span></a>
      <a href="profile.html" class="bottom-link"><i data-lucide="user"></i><span>প্রোফাইল</span></a>
    </section>    

  <main class="container">
        <div id="product-container" >
            <p class="loader">পণ্য লোড হচ্ছে...</p>
        </div>
  </main>
   

    <script>
      // ডাইনামিক আইকন থাকলে তা সক্রিয় করা
      if(window.lucide) lucide.createIcons();
    </script>
    <script>
     
  const LOCALHOST = "http://localhost:3000/products";
  const SERVER = "https://sadharon-store-server.vercel.app/products"; 
  const isLocal = ["localhost", "127.0.0.1", ""].includes(window.location.hostname);
  const API = isLocal ? LOCALHOST : SERVER;

  function calMyCart() {
    const myCartEle = document.getElementById("myCart");
      const topCart = document.getElementById("count")
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = cart.reduce((acc, item) => acc + (item.quantity || 0), 0);
    
    myCartEle.innerHTML = total;
    topCart.innerHTML= total;
      }

  window.addEventListener('pageshow', function(event) {
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
      calMyCart();
    }
  });

  // ২. লোডিং স্কেলিটন
  function showLoading() {
    const container = document.getElementById("product-container");
    container.classList.remove("product-grid");
    container.innerHTML = `
        <div class="skeleton-container">
            ${Array(8).fill(0).map(() => `
                <div class="skeleton-card">
                    <div class="skeleton-img shimmer"></div>
                    <div class="skeleton-text shimmer"></div>
                    <div class="skeleton-text shimmer" style="width: 80%"></div>
                    <div class="skeleton-price shimmer"></div>
                </div>
            `).join('')}
        </div>
    `;
  }

  // ৩. প্রোডাক্ট লোড এবং রেন্ডার
  async function loadProducts() {
    showLoading();
    try {
      const response = await fetch(API);
      const products = await response.json();
      
      const container = document.getElementById("product-container");
      container.className = "product-grid"; 
      container.innerHTML = ""; 

      products.data.forEach(p => {
          
        const savings = Math.round(p.actualPrice - p.discountPrice);

        // কার্ড তৈরি
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
            <div class="image-container">
                ${savings > 0 ? `<span class="discount-tag">${savings} TK OFF</span>` : ''}
                <img src="${p.image}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300'">
            </div>
            <div class="product-info">
                <div>
                    <h3 class="product-title">${p.name}</h3>
                    <div class="price-section">
                        <span class="current-price">${p.discountPrice} Tk</span>
                        ${p.actualPrice > p.discountPrice ? `<span class="old-price">${p.actualPrice} Tk</span>` : ''}
                    </div>
                </div>
                <button class="add-btn">
                    অর্ডার করুন
                </button>
            </div>
        `;

        // ইভেন্ট লিসেনার (JSON.stringify এর ঝামেলা এড়াতে)
        card.querySelector('.add-btn').onclick = () => addToCart(p);
        container.appendChild(card);
      });

      // ডাইনামিক আইকন থাকলে তা সক্রিয় করা
      if(window.lucide) lucide.createIcons();

    } catch (error) {
      document.getElementById("product-container").innerHTML = `
          <div style="text-align:center; padding: 50px; color: #ef4444;">
              <p>পণ্য লোড করা সম্ভব হয়নি। ইন্টারনেট কানেকশন চেক করুন।</p>
              <button onclick="loadProducts()" style="margin-top:10px; padding: 8px 20px; cursor:pointer;">Retry</button>
          </div>
      `;
    }
  }

 // ৪. অ্যাড টু কার্ট লজিক (আপডেটেড)
function addToCart(product) {
  // ১. লোকাল স্টোরেজ থেকে বর্তমান কার্ট ডাটা নেওয়া
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  
  // ২. প্রোডাক্টটি অলরেডি কার্টে আছে কি না চেক করা
  // ব্যাকএন্ডে আমরা productId খুঁজি, তাই এখানেও সেটি ব্যবহার করা নিরাপদ
  const productId = product._id;
  const exists = cart.find(item => item.productId === productId);

  if (exists) {
    // ৩. যদি থাকে, তবে শুধু কোয়ান্টিটি বাড়ানো
    exists.quantity += 1;
  } else {
    // ৪. যদি না থাকে, তবে নতুন অবজেক্ট পুশ করা
    // এখানে আমরা discountPrice বা regular price হ্যান্ডেল করার লজিক দিচ্ছি
    const finalPrice = product.discountPrice || 0;

    cart.push({
      productId: productId,            // ব্যাকএন্ডের জন্য জরুরি
      name: product.name,              // UI-তে দেখানোর জন্য
      price: parseFloat(finalPrice),   // ক্যালকুলেশনের জন্য সংখ্যা হিসেবে রাখা
      image: product.image, // UI-তে দেখানোর জন্য
      quantity: 1,                     // ডিফল্ট ১টি
    });
  }

  // ৫. আপডেট করা কার্ট লোকাল স্টোরেজে সেভ করা
  localStorage.setItem("cart", JSON.stringify(cart));

  // ৬. কার্ট কাউন্টার আপডেট করা (যদি আপনার ফাংশন থাকে)
  if (typeof calMyCart === "function") {
    calMyCart();
  }

  window.location.href = "add-to-cart.html"
}


  // ফাংশন কল
  loadProducts();
  calMyCart();
</script>
</body>
</html>
