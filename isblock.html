  <h1>
    খাবারের তালিকা (আয়াত ৬১ অনুসারে):
​১. বকল (بَقْلِهَا): শাক-সবজি।
২. কিসসা (قِثَّآئِهَا): কাঁকড় বা শসা।
৩. ফুম (فُومِهَا): রসুন (কারো মতে এটি 'গম' বা 'রুটি তৈরির শস্য')।
৪. আদাস (عَدَسِهَا): মসুর ডাল।
৫. বাসাল (بَصَلِهَا): পেঁয়াজ।
  </h1>
