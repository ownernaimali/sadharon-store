<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setting | Sadharon Store | Premium Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
   <link rel="stylesheet"href="css/index.css">
    <style>
    
.settings-container.container {
    margin: 40px auto 80px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
}

@media (min-width: 768px) {
    .settings-container { grid-template-columns: 280px 1fr; }
}

/* Sidebar Styling */
.settings-sidebar {
    background: white;
    padding: 25px;
    border-radius: 16px;
    height: fit-content;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
}

.user-profile-brief {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid #f1f5f9;
}

.avatar {
    width: 50px;
    height: 50px;
    background: #FF6B35;
    color: white;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 20px;
}

.user-details h3 { font-size: 16px; color: #1e293b; }
.user-details p { font-size: 12px; color: #64748b; }

.settings-nav { display: flex; flex-direction: column; gap: 8px; }
.settings-nav a {
    text-decoration: none;
    color: #64748b;
    padding: 12px 15px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: 0.2s;
}

.settings-nav a:hover, .settings-nav a.active { background: #f8fafc; color: #FF6B35; }
.logout-link { margin-top: 20px; color: #ef4444 !important; }

/* Main Content Card */
.settings-card {
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    margin-bottom: 25px;
}

.card-header { margin-bottom: 25px; }
.card-header h2 { font-size: 22px; margin-bottom: 5px; }
.card-header p { font-size: 14px; color: #64748b; }

.form-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;

}

@media (min-width: 600px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
}

.form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px;  color: #334155; }
.form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #e2e8f0; outline: none; font-family: inherit;
}

.form-group input:disabled { background: #f8fafc; cursor: not-allowed; }
.form-group small { font-size: 12px; color: #94a3b8; }

.form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 30px;
    padding-top: 20px;
    border-top: 1px solid #f1f5f9;
}

.btn-save { background: #FF6B35; color: white; border: none; padding: 10px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
.btn-cancel { background: #f1f5f9; color: #64748b; border: none; padding: 10px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }

/* Danger Zone */
.danger-zone { border: 1px solid #fee2e2; }
.danger-zone h3 { color: #b91c1c; margin-bottom: 10px; }
.btn-delete { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 6px; margin-top: 15px; cursor: pointer; font-weight: 600; }
    </style>

</head>
<body>   
    <header>
        <div class="container nav-flex"><div onclick="window.location.href='index.html'"  class="logo">Sadharon<span>Store</span></div><div onclick="window.location.href='add-to-cart.html'" id="cart-count-display" style="background: #1e293b; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;"><i data-lucide="shopping-cart" style="width: 14px; vertical-align: middle;"></i> <span id="count">0</span></div></div>
    </header>
    <!-- bottom nav section -->
    <section class="bottom-nav">
      <a href="index.html" class="bottom-link"><i data-lucide="home"></i><span>হোম</span></a>
      <a href="index.html" class="bottom-link"><i data-lucide="grid"></i><span>ক্যাটাগরি</span></a>
      <div class="bottom-link main-cart">
        <div onclick="window.location.href='add-to-cart.html'" class="cart-btn-inner">
          <i data-lucide="shopping-bag"></i>
          <span id="myCart" class="cart-badge">0</span>
        </div>
      </div>      
      <a href="view-order.html" class="bottom-link">  <i data-lucide="package"></i> <span>আমার অর্ডার</span></a>
      <a href="profile.html" class="bottom-link  active"><i data-lucide="user"></i><span>প্রোফাইল</span></a>
    </section>    

<div class="settings-container container">
    <aside class="settings-sidebar">
        <div class="user-profile-brief">
            <div id="avatar" class="avatar">JS</div>
            <div class="user-details">
                <h3 id="name">John Sadharon</h3>
                <p>Customer ID: <span id="userId"></span></p>
            </div>
        </div>
        <nav class="settings-nav">
            <a href="#settingsForm" class="active"><i data-lucide="user"></i> Edit Profile</a>
            <a href="view-order.html"><i data-lucide="package"></i> My Orders</a>
            <a href="#settingsForm"><i data-lucide="map-pin"></i> Shipping Address</a>
            <a href="security.html"><i data-lucide="lock"></i> Password & Security</a>
            <a href="#" onclick="logout()" class="logout-link"><i data-lucide="log-out"></i> Logout</a>
        </nav>
    </aside>

    <main class="settings-main">
        <div class="settings-card">
            <div class="card-header">
                <h2>Edit Profile</h2>
                <p>Manage your public information and account details.</p>
            </div>
            
  <form id="settingsForm">
    <div class="form-grid">
        <div class="form-group">
            <label>Full Name</label>
            <input id="userName" type="text" value="John Sadharon" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input id="userPhone" type="tel" value="019XXXXXXXXX" disabled>
            <small>Phone Number cannot be changed manually.</small>
        </div>

        <div class="form-group">
            <label>Address</label>
             <textarea id="userAddress" rows="3" placeholder="e.g. House 12, Road 5, Dhanmondi"></textarea>
  
          
        </div>

        <div class="form-group">
            <label>Default Currency</label>
            <select id="userCurrency">
                <option value="BDT">BDT (Taka)</option>
            </select>
        </div>
    </div>



    <div class="form-actions">
        <button type="button" id="cancelBtn"class="btn-cancel">Cancel</button>
        <button type="submit" class="btn-save">Save Changes</button>
    </div>
</form>

        </div>
        <!--
        <div class="settings-card danger-zone">
            <h3>Danger Zone</h3>
            <p>Once you delete your account, there is no going back. Please be certain.</p>
            <button class="btn-delete">Delete Account</button>
        </div>
        -->
    </main>
</div>   

    <script>
      // ডাইনামিক আইকন থাকলে তা সক্রিয় করা
      if(window.lucide) lucide.createIcons();
      // ১. কার্ট সংখ্যা আপডেট (ব্যাক বাটন সাপোর্ট সহ)
  function calMyCart() {
    const myCartEle = document.getElementById("myCart");
      const topCart = document.getElementById("count")
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let total = cart.reduce((acc, item) => acc + (item.quantity || 0), 0);
    
    myCartEle.innerHTML = total;
    topCart.innerHTML= total;
      }

  window.addEventListener('pageshow', function(event) {
    if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
      calMyCart();
    }
  });
    
calMyCart()
    
    
   // 1. Get the token from storage
const token = localStorage.getItem('token');

// 2. Define API Base URL
const LOCALHOST = "http://localhost:3000/users";
const SERVER = "https://sadharon-store-server.vercel.app/users";
const API = window.location.hostname.includes("vercel") ? SERVER : LOCALHOST;

    // 3. Optimized Fetch Call
if (token) {
   fetch(`${API}?token=${token}`)
        .then(res => res.json())
        .then(data => {
            // Get the first user from the array
            const user = Array.isArray(data) ? data[0] : data;
            if (user && user._id) {
                
            const avatar = user.name.trim().split(/\s+/).map(part => part[0]).join('').toUpperCase().slice(0, 2);       
                document.getElementById('name').innerHTML = user.name;
               document.getElementById('userId').innerHTML = user._id;
              document.getElementById("avatar").innerHTML = avatar
                // Mapping the data to the HTML IDs
                document.getElementById('userName').value = user.name;
                document.getElementById('userPhone').value = user.phone;
                document.getElementById('userAddress').value = user.address; // New field
                
                
            }  else {
                
     console.warn("No token found, redirecting or showing login...");
    localStorage.removeItem('token');
    window.location.href = "login.html?page=setting";
              }
        })
        .catch(err => {
            console.error("Error fetching user:", err)
              alert(err.message + " | No token found, redirecting or showing login...");
    localStorage.removeItem('token');
    window.location.href = "login.html?page=setting";
        });
} else {
    
    console.warn("No token found, redirecting or showing login...");
    localStorage.removeItem('token');
    window.location.href = "login.html?page=setting";
}

// 4. Logout Function
function logout() {    
    localStorage.removeItem('token');
    window.location.href = "index.html";
}

// Form handling
settingsForm.onsubmit = async (e) => {
    e.preventDefault(); // Prevents the page from reloading

    // 1. Collect data from your HTML IDs
    const updatedData = {
        name: document.getElementById('userName').value,
        address: document.getElementById('userAddress').value,
        };

    // 2. Get the token for authentication
    const token = localStorage.getItem('token');

    try {
        // 3. Fetch API (Using the API variable you defined earlier)
        // We use PATCH because we are updating existing data
        const response = await fetch(`${API}?token=${token}`, {
            method: 'PATCH', 
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(updatedData)
        });

        const result = await response.json();

        if (response.ok) {
            alert(result.message);
            console.log("Server Response:", result);
        } else {
            alert('Update failed: ' + (result.message || 'Unknown error'));
        }
    } catch (error) {
        console.error('Fetch error:', error);
        alert('Could not connect to server. Please check your connection.');
    }
};
    

document.getElementById('cancelBtn').onclick = () => {
    if(confirm("Discard changes?")) {
        window.location.href = "index.html"; // Redirect user
    }
};

    
    </script>
</body>
</html>
