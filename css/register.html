<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sadharon Store | User Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- General CSS --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #f7f9fc; color: #1e293b; line-height: 1.6; }
        .container { width: 90%; max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        
        /* Header */
        .logo { text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 25px; }
        .logo span { color: #FF6B35; }

        /* Form Elements */
        h2 { font-size: 20px; margin-bottom: 20px; text-align: center; color: #334155; }
        label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: #FF6B35; }
        
        .btn { width: 100%; background: #FF6B35; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #e55a2b; }
        .btn-outline { background: transparent; color: #64748b; border: 1px solid #e2e8f0; margin-top: 10px; }

        .switch-text { text-align: center; margin-top: 15px; font-size: 14px; color: #64748b; }
        .switch-text span { color: #FF6B35; cursor: pointer; font-weight: 600; }

        /* Success Message */
        .success-box { text-align: center; padding: 20px; }
        .success-icon { color: #22c55e; margin-bottom: 15px; }

        /* Contact Section */
        .contact-info { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; color: #475569; }
    </style>
</head>
<body>

    <div id="register-page" class="container">
        <div class="logo">Sadharon<span>Store</span></div>
        <h2>নতুন অ্যাকাউন্ট তৈরি করুন</h2>
        <form id="regForm">
            <label>আপনার নাম</label>
            <input type="text" placeholder="পুরো নাম লিখুন" required>
            <label>ফোন নম্বর</label>
            <input type="tel" placeholder="০১৭XXXXXXXX" required>
            <label>ঠিকানা</label>
            <textarea placeholder="আপনার বিস্তারিত ঠিকানা" rows="3" required></textarea>
            <label>পাসওয়ার্ড</label>
            <input type="password" placeholder="কমপক্ষে ৬ ডিজিট" required>
            <button type="submit" class="btn">রেজিস্ট্রেশন করুন</button>
        </form>
        <p class="switch-text">ইতিমধ্যে অ্যাকাউন্ট আছে? <span onclick="showPage('login-page')">লগইন করুন</span></p>
    </div>

    <div id="login-page" class="container hidden">
        <div class="logo">Sadharon<span>Store</span></div>
        <h2>লগইন করুন</h2>
        <form id="loginForm">
            <label>ফোন নম্বর</label>
            <input type="tel" placeholder="ফোন নম্বর দিন" required>
            <label>পাসওয়ার্ড</label>
            <input type="password" placeholder="পাসওয়ার্ড দিন" required>
            <button type="submit" class="btn">লগইন</button>
        </form>
        <p class="switch-text">অ্যাকাউন্ট নেই? <span onclick="showPage('register-page')">নতুন তৈরি করুন</span></p>
    </div>

    <div id="order-page" class="container hidden">
        <div class="success-box">
            <div class="success-icon"><i data-lucide="check-circle" size="48"></i></div>
            <h2>অর্ডার সফল হয়েছে!</h2>
            <p>আমাদের প্রতিনিধি খুব দ্রুত আপনার ঠিকানায় পণ্য পৌঁছে দিবে।</p>
            <button class="btn btn-outline" onclick="showPage('contact-page')">যোগাযোগ করুন</button>
        </div>
    </div>

    <div id="contact-page" class="container hidden">
        <h2>আমাদের সাথে যোগাযোগ</h2>
        <div class="contact-info">
            <i data-lucide="phone"></i> <span>০১৯০০-০০০০০০</span>
        </div>
        <div class="contact-info">
            <i data-lucide="mail"></i> <span>support@sadharonstore.com</span>
        </div>
        <div class="contact-info">
            <i data-lucide="map-pin"></i> <span>ঢাকা, বাংলাদেশ</span>
        </div>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        <form>
            <label>আপনার মেসেজ</label>
            <textarea placeholder="কিছু লিখতে চাইলে এখানে লিখুন..." rows="4"></textarea>
            <button type="button" class="btn" onclick="alert('ধন্যবাদ! আপনার মেসেজটি পাঠানো হয়েছে।')">মেসেজ পাঠান</button>
        </form>
        <button class="btn btn-outline" onclick="showPage('login-page')">হোমে ফিরে যান</button>
    </div>

    <script>
        // পেজ পরিবর্তন করার ফাংশন
        function showPage(pageId) {
            document.querySelectorAll('.container').forEach(page => {
                page.classList.add('hidden');
            });
            document.getElementById(pageId).classList.remove('hidden');
            lucide.createIcons();
        }

        // রেজিস্ট্রেশন সাবমিট হ্যান্ডলার
        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('রেজিস্ট্রেশন সফল! এখন লগইন করুন।');
            showPage('login-page');
        });

        // লগইন সাবমিট হ্যান্ডলার
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // এখানে আপনি চেক করতে পারেন, আপাতত সরাসরি অর্ডারে নিয়ে যাচ্ছি উদাহরণের জন্য
            alert('লগইন সফল!');
            showPage('order-page');
        });

        // আইকন ইনিশিয়ালাইজ
        lucide.createIcons();
    </script>

</body>
</html>
